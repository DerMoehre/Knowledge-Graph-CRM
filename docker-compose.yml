services:
  backend:
    build:
      context: app/backend/
      dockerfile: Dockerfile
    container_name: crm-api
    ports:
      - "${API_PORT:-8000}:8000"
    env_file:
      - .env

  frontend:
    build:
      context: app/frontend/
      dockerfile: Dockerfile
    container_name: crm-frontend
    ports:
      - "${FRONTEND_PORT:-8501}:8501"
    env_file:
      - .env
    environment:
      - BACKEND_URL=http://backend:8000
    depends_on:
      - backend
